spring:
  application:
    name: metrics-collector
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:api_analytics}
    username: ${POSTGRES_USER:api_analytics}
    password: ${POSTGRES_PASSWORD:change_me_locally}
  jpa:
    hibernate:
      ddl-auto: validate
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:29092}
    consumer:
      group-id: metrics-collector
      auto-offset-reset: earliest
      enable-auto-commit: false
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.innovations.api.events.*"
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    listener:
      ack-mode: manual

server:
  port: ${PORT_METRICS_COLLECTOR:8083}

kafka:
  topics:
    api-logs: ${KAFKA_TOPIC_API_LOGS:api-logs}
    api-logs-dlq: ${KAFKA_TOPIC_API_LOGS_DLQ:api-logs-dlq}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
